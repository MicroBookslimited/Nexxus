<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0f1729" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NEXXUS POS</title>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        var script = document.createElement('script');
        script.dataset.bot = "683486140bc14de8bd770258";
        script.dataset.zindex = "99999";
        script.dataset.position = "left";
        script.dataset.alignment = "left";
        script.src = "https://panel.chatfuel.com/widgets/chat-widget/chat-widget.js";
        script.async = true;
        script.defer = true;
        document.getElementsByTagName('head')[0].appendChild(script);
      })()
    </script>
    <style>
      /* Force Chatfuel widget to bottom-left */
      iframe[src*="chatfuel"],
      div[id*="chatfuel"],
      div[class*="chatfuel"],
      div[id*="cf-"],
      div[class*="cf-"],
      #cf-widget-container,
      .cf-widget-container,
      [data-chatfuel],
      .chatfuel-widget,
      #chatfuel-widget {
        left: 20px !important;
        right: auto !important;
        bottom: 20px !important;
        position: fixed !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Reposition Chatfuel widget to bottom-left after it injects itself
      (function () {
        function reposition(el) {
          el.style.setProperty('left',   '20px',  'important');
          el.style.setProperty('right',  'auto',  'important');
          el.style.setProperty('bottom', '20px',  'important');
          el.style.setProperty('position', 'fixed', 'important');
        }
        function scanAndFix() {
          document.querySelectorAll(
            'iframe[src*="chatfuel"], div[id*="chatfuel"], div[class*="chatfuel"], ' +
            'div[id*="cf-"], div[class*="cf-"], #cf-widget-container, .cf-widget-container'
          ).forEach(reposition);
        }
        const observer = new MutationObserver(scanAndFix);
        observer.observe(document.body, { childList: true, subtree: true });
        // Also run after a short delay for slow-loading widgets
        setTimeout(scanAndFix, 2000);
        setTimeout(scanAndFix, 5000);
      })();
    </script>
  </body>
</html>
