kind = "web"
  previewPath = "/"
  title = "NEXXUS POS"
  version = "1.0.0"
  id = "artifacts/nexus-pos"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/", "/app/", "/customer-display/", "/menu/", "/reseller/" ]
  localPort = 23661

  [services.development]
  run = "pnpm --filter @workspace/nexus-pos run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/nexus-pos", "run", "build" ]
  publicDir = "artifacts/nexus-pos/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "23661"
  