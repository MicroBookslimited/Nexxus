kind = "web"
previewPath = "/menu/"
title = "NEXXUS POS — Customer Menu"
version = "1.0.0"
id = "artifacts/nexus-menu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/menu/" ]
localPort = 18376

[services.development]
run = "pnpm --filter @workspace/nexus-menu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-menu", "run", "build" ]
publicDir = "artifacts/nexus-menu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18376"
BASE_PATH = "/menu/"
