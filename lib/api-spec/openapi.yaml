openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nexus POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: variants
    description: Product variants and modifiers
  - name: orders
    description: Order management
  - name: held-orders
    description: Held (parked) order management
  - name: dashboard
    description: Dashboard analytics
  - name: customers
    description: Customer management
  - name: reports
    description: Business reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/customize:
    get:
      operationId: getProductCustomization
      tags: [variants]
      summary: Get full variant groups + modifier groups for POS customization dialog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product customization data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCustomization"
        "404":
          description: Not found

  /products/{id}/variants:
    get:
      operationId: getProductVariants
      tags: [variants]
      summary: Get all variant groups with options for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Variant groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariantGroup"
    put:
      operationId: saveProductVariants
      tags: [variants]
      summary: Replace all variant groups for a product (full overwrite)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveVariantsBody"
      responses:
        "200":
          description: Saved variant groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariantGroup"

  /products/{id}/modifiers:
    get:
      operationId: getProductModifiers
      tags: [variants]
      summary: Get all modifier groups with options for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modifier groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"
    put:
      operationId: saveProductModifiers
      tags: [variants]
      summary: Replace all modifier groups for a product (full overwrite)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveModifiersBody"
      responses:
        "200":
          description: Saved modifier groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, cancelled, refunded, voided]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (also used for refund/void)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /held-orders:
    get:
      operationId: listHeldOrders
      tags: [held-orders]
      summary: List all held (parked) orders
      responses:
        "200":
          description: List of held orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeldOrder"
    post:
      operationId: createHeldOrder
      tags: [held-orders]
      summary: Park (hold) the current cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHeldOrderBody"
      responses:
        "201":
          description: Created held order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldOrder"

  /held-orders/{id}:
    get:
      operationId: getHeldOrder
      tags: [held-orders]
      summary: Recall a held order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Held order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldOrder"
    delete:
      operationId: deleteHeldOrder
      tags: [held-orders]
      summary: Delete a held order (after recall or dismiss)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [dashboard]
      summary: Get sales grouped by product category
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  /dashboard/daily-sales:
    get:
      operationId: getDailySales
      tags: [dashboard]
      summary: Get daily revenue for the last N days
      parameters:
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daily sales data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailySales"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products by revenue
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/payment-methods:
    get:
      operationId: getPaymentMethodBreakdown
      tags: [dashboard]
      summary: Get revenue breakdown by payment method
      responses:
        "200":
          description: Payment method breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethodSales"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{id}/orders:
    get:
      operationId: getCustomerOrders
      tags: [customers]
      summary: Get all orders for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [dashboard]
      summary: Get products with low stock
      parameters:
        - name: threshold
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get report summary for a date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Report summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /reports/hourly:
    get:
      operationId: getHourlySales
      tags: [reports]
      summary: Get hourly sales breakdown for a date
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Hourly sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlySales"

  /reports/export:
    get:
      operationId: exportOrders
      tags: [reports]
      summary: Export orders as CSV for a date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        inStock:
          type: boolean
        stockCount:
          type: integer
        hasVariants:
          type: boolean
        hasModifiers:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - category
        - inStock
        - stockCount
        - hasVariants
        - hasModifiers
        - createdAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        imageUrl:
          type: string
        barcode:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: integer
      required:
        - name
        - price
        - category

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [pending, completed, cancelled, refunded, voided]
        subtotal:
          type: number
          format: float
        discountType:
          type: string
          enum: [percent, fixed]
          nullable: true
        discountAmount:
          type: number
          format: float
          nullable: true
        discountValue:
          type: number
          format: float
          nullable: true
        tax:
          type: number
          format: float
        total:
          type: number
          format: float
        paymentMethod:
          type: string
          nullable: true
        splitCardAmount:
          type: number
          format: float
          nullable: true
        splitCashAmount:
          type: number
          format: float
          nullable: true
        notes:
          type: string
          nullable: true
        voidReason:
          type: string
          nullable: true
        customerId:
          type: integer
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - orderNumber
        - status
        - subtotal
        - tax
        - total
        - items
        - createdAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: float
        discountAmount:
          type: number
          format: float
          nullable: true
        variantAdjustment:
          type: number
          format: float
          nullable: true
        modifierAdjustment:
          type: number
          format: float
          nullable: true
        variantChoices:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ChoiceItem"
        modifierChoices:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ChoiceItem"
        lineTotal:
          type: number
          format: float
      required:
        - id
        - productId
        - productName
        - quantity
        - unitPrice
        - lineTotal

    CreateOrderBody:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
              discountAmount:
                type: number
                format: float
              variantChoices:
                type: array
                items:
                  $ref: "#/components/schemas/ChoiceItem"
              modifierChoices:
                type: array
                items:
                  $ref: "#/components/schemas/ChoiceItem"
            required:
              - productId
              - quantity
        paymentMethod:
          type: string
        splitCardAmount:
          type: number
          format: float
        splitCashAmount:
          type: number
          format: float
        discountType:
          type: string
          enum: [percent, fixed]
        discountAmount:
          type: number
          format: float
        notes:
          type: string
        customerId:
          type: integer
      required:
        - items
        - paymentMethod

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, cancelled, refunded, voided]
        voidReason:
          type: string
      required:
        - status

    HeldOrder:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/HeldOrderItem"
        notes:
          type: string
          nullable: true
        discountType:
          type: string
          enum: [percent, fixed]
          nullable: true
        discountAmount:
          type: number
          format: float
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - items
        - createdAt

    HeldOrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
          format: float
        quantity:
          type: integer
      required:
        - productId
        - productName
        - price
        - quantity

    CreateHeldOrderBody:
      type: object
      properties:
        label:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/HeldOrderItem"
        notes:
          type: string
        discountType:
          type: string
          enum: [percent, fixed]
        discountAmount:
          type: number
          format: float
      required:
        - items

    DashboardSummary:
      type: object
      properties:
        todaySales:
          type: number
          format: float
        todayOrders:
          type: integer
        totalProducts:
          type: integer
        avgOrderValue:
          type: number
          format: float
        weekSales:
          type: number
          format: float
        weekOrders:
          type: integer
      required:
        - todaySales
        - todayOrders
        - totalProducts
        - avgOrderValue
        - weekSales
        - weekOrders

    CategorySales:
      type: object
      properties:
        category:
          type: string
        totalSales:
          type: number
          format: float
        orderCount:
          type: integer
      required:
        - category
        - totalSales
        - orderCount

    DailySales:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: number
          format: float
        orders:
          type: integer
      required:
        - date
        - revenue
        - orders

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalRevenue:
          type: number
          format: float
        unitsSold:
          type: integer
      required:
        - productId
        - productName
        - totalRevenue
        - unitsSold

    PaymentMethodSales:
      type: object
      properties:
        method:
          type: string
        revenue:
          type: number
          format: float
        count:
          type: integer
      required:
        - method
        - revenue
        - count

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        loyaltyPoints:
          type: integer
        totalSpent:
          type: number
          format: float
        orderCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - loyaltyPoints
        - totalSpent
        - orderCount
        - createdAt

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
      required:
        - name

    ReportSummary:
      type: object
      properties:
        revenue:
          type: number
          format: float
        orders:
          type: integer
        avgOrderValue:
          type: number
          format: float
        newCustomers:
          type: integer
        topProduct:
          type: string
          nullable: true
        voidedOrders:
          type: integer
      required:
        - revenue
        - orders
        - avgOrderValue
        - newCustomers
        - voidedOrders

    HourlySales:
      type: object
      properties:
        hour:
          type: integer
        revenue:
          type: number
          format: float
        orders:
          type: integer
      required:
        - hour
        - revenue
        - orders

    ListCustomersQueryParams:
      type: object
      properties:
        search:
          type: string

    GetReportSummaryQueryParams:
      type: object
      properties:
        from:
          type: string
        to:
          type: string

    GetHourlySalesQueryParams:
      type: object
      properties:
        date:
          type: string

    ChoiceItem:
      type: object
      properties:
        groupId:
          type: integer
        groupName:
          type: string
        optionId:
          type: integer
        optionName:
          type: string
        priceAdjustment:
          type: number
          format: float
      required:
        - groupId
        - groupName
        - optionId
        - optionName
        - priceAdjustment

    VariantOption:
      type: object
      properties:
        id:
          type: integer
        groupId:
          type: integer
        name:
          type: string
        priceAdjustment:
          type: number
          format: float
        position:
          type: integer
      required:
        - id
        - groupId
        - name
        - priceAdjustment
        - position

    VariantGroup:
      type: object
      properties:
        id:
