openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nexus POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: variants
    description: Product variants and modifiers
  - name: orders
    description: Order management
  - name: held-orders
    description: Held (parked) order management
  - name: dashboard
    description: Dashboard analytics
  - name: customers
    description: Customer management
  - name: reports
    description: Business reports
  - name: tables
    description: Restaurant table management
  - name: kitchen
    description: Kitchen display system
  - name: purchases
    description: Stock purchase management
  - name: purchase-bills
    description: Multi-product purchase bill management
  - name: staff
    description: Staff accounts and roles
  - name: cash
    description: Cash drawer and shift management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/customize:
    get:
      operationId: getProductCustomization
      tags: [variants]
      summary: Get full variant groups + modifier groups for POS customization dialog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product customization data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCustomization"
        "404":
          description: Not found

  /products/{id}/variants:
    get:
      operationId: getProductVariants
      tags: [variants]
      summary: Get all variant groups with options for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Variant groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariantGroup"
    put:
      operationId: saveProductVariants
      tags: [variants]
      summary: Replace all variant groups for a product (full overwrite)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveVariantsBody"
      responses:
        "200":
          description: Saved variant groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariantGroup"

  /products/{id}/modifiers:
    get:
      operationId: getProductModifiers
      tags: [variants]
      summary: Get all modifier groups with options for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modifier groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"
    put:
      operationId: saveProductModifiers
      tags: [variants]
      summary: Replace all modifier groups for a product (full overwrite)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveModifiersBody"
      responses:
        "200":
          description: Saved modifier groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, pending, completed, cancelled, refunded, voided]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (also used for refund/void)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/charge:
    post:
      operationId: chargeOrder
      tags: [orders]
      summary: Complete payment on an open (sent-to-kitchen) order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOrderBody"
      responses:
        "200":
          description: Completed order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /held-orders:
    get:
      operationId: listHeldOrders
      tags: [held-orders]
      summary: List all held (parked) orders
      responses:
        "200":
          description: List of held orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeldOrder"
    post:
      operationId: createHeldOrder
      tags: [held-orders]
      summary: Park (hold) the current cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHeldOrderBody"
      responses:
        "201":
          description: Created held order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldOrder"

  /held-orders/{id}:
    get:
      operationId: getHeldOrder
      tags: [held-orders]
      summary: Recall a held order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Held order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldOrder"
    delete:
      operationId: deleteHeldOrder
      tags: [held-orders]
      summary: Delete a held order (after recall or dismiss)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [dashboard]
      summary: Get sales grouped by product category
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  /dashboard/daily-sales:
    get:
      operationId: getDailySales
      tags: [dashboard]
      summary: Get daily revenue for the last N days
      parameters:
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daily sales data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailySales"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products by revenue
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/payment-methods:
    get:
      operationId: getPaymentMethodBreakdown
      tags: [dashboard]
      summary: Get revenue breakdown by payment method
      responses:
        "200":
          description: Payment method breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethodSales"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{id}/orders:
    get:
      operationId: getCustomerOrders
      tags: [customers]
      summary: Get all orders for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [dashboard]
      summary: Get products with low stock
      parameters:
        - name: threshold
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get report summary for a date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Report summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /reports/hourly:
    get:
      operationId: getHourlySales
      tags: [reports]
      summary: Get hourly sales breakdown for a date
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Hourly sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlySales"

  /reports/export:
    get:
      operationId: exportOrders
      tags: [reports]
      summary: Export orders as CSV for a date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string

  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List all dining tables
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiningTable"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a dining table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableBody"
      responses:
        "201":
          description: Created table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiningTable"

  /tables/{id}:
    patch:
      operationId: updateTable
      tags: [tables]
      summary: Update a dining table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTableBody"
      responses:
        "200":
          description: Updated table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiningTable"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete a dining table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /kitchen:
    get:
      operationId: listKitchenOrders
      tags: [kitchen]
      summary: List pending kitchen orders
      responses:
        "200":
          description: Kitchen order queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitchenOrder"

  /kitchen/{id}/status:
    patch:
      operationId: updateKitchenOrderStatus
      tags: [kitchen]
      summary: Update kitchen order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, preparing, ready, completed]
              required:
                - status
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                required:
                  - id
                  - status

  /kds-screens:
    get:
      operationId: listKdsScreens
      tags: [kitchen]
      summary: List all KDS screens
      responses:
        "200":
          description: KDS screens list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KdsScreen"
    post:
      operationId: createKdsScreen
      tags: [kitchen]
      summary: Create a KDS screen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKdsScreenBody"
      responses:
        "201":
          description: Created KDS screen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdsScreen"

  /kds-screens/{id}:
    patch:
      operationId: updateKdsScreen
      tags: [kitchen]
      summary: Update a KDS screen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKdsScreenBody"
      responses:
        "200":
          description: Updated KDS screen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdsScreen"
    delete:
      operationId: deleteKdsScreen
      tags: [kitchen]
      summary: Delete a KDS screen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/verify-pin:
    post:
      operationId: verifyStaffPin
      tags: [staff]
      summary: Verify staff PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                staffId:
                  type: integer
                pin:
                  type: string
              required:
                - staffId
                - pin
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "401":
          description: Invalid PIN

  /staff/authenticate:
    post:
      operationId: authenticateStaff
      tags: [staff]
      summary: Authenticate staff by PIN only (no staffId needed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pin:
                  type: string
                requiredRoles:
                  type: array
                  items:
                    type: string
              required:
                - pin
      responses:
        "200":
          description: Authenticated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "401":
          description: Invalid PIN
        "403":
          description: Insufficient role

  /staff/{id}:
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Deactivate a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deactivated

  /purchase-bills:
    get:
      operationId: listPurchaseBills
      tags: [purchase-bills]
      summary: List all purchase bills
      responses:
        "200":
          description: List of purchase bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseBill"
    post:
      operationId: createPurchaseBill
      tags: [purchase-bills]
      summary: Create a purchase bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseBillBody"
      responses:
        "201":
          description: Created purchase bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseBill"

  /purchase-bills/{id}:
    get:
      operationId: getPurchaseBill
      tags: [purchase-bills]
      summary: Get a purchase bill with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase bill with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseBillWithItems"
    delete:
      operationId: deletePurchaseBill
      tags: [purchase-bills]
      summary: Delete a draft purchase bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /purchase-bills/{id}/confirm:
    post:
      operationId: confirmPurchaseBill
      tags: [purchase-bills]
      summary: Confirm a purchase bill and update inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed purchase bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseBillWithItems"

  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      summary: List all stock purchases
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Record a new stock purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseBody"
      responses:
        "201":
          description: Purchase recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}:
    delete:
      operationId: deletePurchase
      tags: [purchases]
      summary: Delete a purchase record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cash/sessions:
    get:
      operationId: listCashSessions
      tags: [cash]
      summary: List all cash sessions
      responses:
        "200":
          description: List of cash sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashSession"
    post:
      operationId: openCashSession
      tags: [cash]
      summary: Open a new cash session (start shift)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenCashSessionBody"
      responses:
        "201":
          description: Session opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSession"
        "409":
          description: Session already open

  /cash/sessions/current:
    get:
      operationId: getCurrentCashSession
      tags: [cash]
      summary: Get the current open cash session with summary
      responses:
        "200":
          description: Current session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSessionDetail"
        "404":
          description: No open session

  /cash/sessions/{id}:
    get:
      operationId: getCashSession
      tags: [cash]
      summary: Get a cash session by ID with summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSessionDetail"
        "404":
          description: Not found

  /cash/sessions/{id}/payouts:
    post:
      operationId: addCashPayout
      tags: [cash]
      summary: Add a payout to an open session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCashPayoutBody"
      responses:
        "201":
          description: Payout recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashPayout"
        "404":
          description: Session not found

  /cash/sessions/{id}/close:
    post:
      operationId: closeCashSession
      tags: [cash]
      summary: Close the session (end shift)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseCashSessionBody"
      responses:
        "200":
          description: Session closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSession"
        "404":
          description: Session not found

