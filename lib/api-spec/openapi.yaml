openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nexus POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: orders
    description: Order management
  - name: held-orders
    description: Held (parked) order management
  - name: dashboard
    description: Dashboard analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, cancelled, refunded, voided]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (also used for refund/void)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /held-orders:
    get:
      operationId: listHeldOrders
      tags: [held-orders]
      summary: List all held (parked) orders
      responses:
        "200":
          description: List of held orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeldOrder"
    post:
      operationId: createHeldOrder
      tags: [held-orders]
      summary: Park (hold) the current cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHeldOrderBody"
      responses:
        "201":
          description: Created held order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldOrder"

  /held-orders/{id}:
    get:
      operationId: getHeldOrder
      tags: [held-orders]
      summary: Recall a held order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Held order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeldOrder"
    delete:
      operationId: deleteHeldOrder
      tags: [held-orders]
      summary: Delete a held order (after recall or dismiss)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [dashboard]
      summary: Get sales grouped by product category
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        inStock:
          type: boolean
        stockCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - category
        - inStock
        - stockCount
        - createdAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        imageUrl:
          type: string
        barcode:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: integer
      required:
        - name
        - price
        - category

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [pending, completed, cancelled, refunded, voided]
        subtotal:
          type: number
          format: float
        discountType:
          type: string
          enum: [percent, fixed]
          nullable: true
        discountAmount:
          type: number
          format: float
          nullable: true
        discountValue:
          type: number
          format: float
          nullable: true
        tax:
          type: number
          format: float
        total:
          type: number
          format: float
        paymentMethod:
          type: string
          nullable: true
        splitCardAmount:
          type: number
          format: float
          nullable: true
        splitCashAmount:
          type: number
          format: float
          nullable: true
        notes:
          type: string
          nullable: true
        voidReason:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - orderNumber
        - status
        - subtotal
        - tax
        - total
        - items
        - createdAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: float
        discountAmount:
          type: number
          format: float
          nullable: true
        lineTotal:
          type: number
          format: float
      required:
        - id
        - productId
        - productName
        - quantity
        - unitPrice
        - lineTotal

    CreateOrderBody:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
              discountAmount:
                type: number
                format: float
            required:
              - productId
              - quantity
        paymentMethod:
          type: string
        splitCardAmount:
          type: number
          format: float
        splitCashAmount:
          type: number
          format: float
        discountType:
          type: string
          enum: [percent, fixed]
        discountAmount:
          type: number
          format: float
        notes:
          type: string
      required:
        - items
        - paymentMethod

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, cancelled, refunded, voided]
        voidReason:
          type: string
      required:
        - status

    HeldOrder:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/HeldOrderItem"
        notes:
          type: string
          nullable: true
        discountType:
          type: string
          enum: [percent, fixed]
          nullable: true
        discountAmount:
          type: number
          format: float
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - items
        - createdAt

    HeldOrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
          format: float
        quantity:
          type: integer
      required:
        - productId
        - productName
        - price
        - quantity

    CreateHeldOrderBody:
      type: object
      properties:
        label:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/HeldOrderItem"
        notes:
          type: string
        discountType:
          type: string
          enum: [percent, fixed]
        discountAmount:
          type: number
          format: float
      required:
        - items

    DashboardSummary:
      type: object
      properties:
        todaySales:
          type: number
          format: float
        todayOrders:
          type: integer
        totalProducts:
          type: integer
        avgOrderValue:
          type: number
          format: float
        weekSales:
          type: number
          format: float
        weekOrders:
          type: integer
      required:
        - todaySales
        - todayOrders
        - totalProducts
        - avgOrderValue
        - weekSales
        - weekOrders

    CategorySales:
      type: object
      properties:
        category:
          type: string
        totalSales:
          type: number
          format: float
        orderCount:
          type: integer
      required:
        - category
        - totalSales
        - orderCount
